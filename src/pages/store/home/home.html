<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodStore - Catálogo</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --rojo: #C0392B;
            --amarillo: #F1C40F;
            --fondo: #FAFAFA;
            --texto: #1A1A1A;
            --blanco: #FFFFFF;
            --borde: #E0E0E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background-color: var(--rojo);
        }

        .header-contenido {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--amarillo);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 24px;
        }

        nav ul li a {
            color: var(--blanco);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav ul li a:hover {
            color: var(--amarillo);
        }

        /* LAYOUT */
        .contenido-principal {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 24px;
            display: flex;
            gap: 32px;
            flex: 1;
            width: 100%;
        }

        /* ASIDE */
        aside {
            width: 190px;
            flex-shrink: 0;
        }

        aside h2 {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--rojo);
            margin-bottom: 12px;
            border-bottom: 2px solid var(--amarillo);
            padding-bottom: 8px;
        }

        #lista-categorias {
            list-style: none;
        }

        #lista-categorias li {
            border-bottom: 1px solid var(--borde);
        }

        #lista-categorias li a {
            display: block;
            padding: 10px 0;
            text-decoration: none;
            color: var(--texto);
            font-size: 14px;
            transition: color 0.2s;
            cursor: pointer;
        }

        #lista-categorias li a:hover {
            color: var(--rojo);
            font-weight: 600;
        }

        /* MAIN */
        main {
            flex: 1;
        }

        #form-busqueda {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        #form-busqueda input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--borde);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        #form-busqueda input:focus {
            outline: none;
            border-color: var(--rojo);
        }

        #form-busqueda button {
            padding: 10px 20px;
            background-color: var(--rojo);
            color: var(--blanco);
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s;
        }

        #form-busqueda button:hover {
            background-color: #a93226;
        }

        main h2 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 20px;
            border-left: 4px solid var(--amarillo);
            padding-left: 10px;
        }

        /* PRODUCTOS */
        #seccion-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px;
        }

        .producto {
            background-color: var(--blanco);
            border: 1px solid var(--borde);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .producto img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background-color: #eee;
        }

        .producto-info {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .producto-info h3 {
            font-size: 15px;
            font-weight: 600;
        }

        .producto-info p {
            font-size: 13px;
            color: #666;
        }

        .precio {
            font-size: 16px !important;
            font-weight: 700 !important;
            color: var(--rojo) !important;
            margin-top: 4px;
        }

        .producto-info button {
            margin-top: auto;
            padding: 9px;
            background-color: var(--amarillo);
            color: var(--texto);
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s;
        }

        .producto-info button:hover {
            background-color: #d4ac0d;
        }

        .sin-resultados {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* FOOTER */
        footer {
            background-color: var(--rojo);
            color: var(--blanco);
            text-align: center;
            padding: 20px 24px;
            font-size: 13px;
            line-height: 2;
            margin-top: auto;
        }

        footer a {
            color: var(--amarillo);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-contenido">
            <h1 class="logo">FoodStore</h1>
            <nav>
                <ul>
                    <li><a href="./home.html">Inicio</a></li>
                    <li><a href="#">Mis Pedidos</a></li>
                    <li><a href="../cart/cart.html">Carrito</a></li>
                    <li><a href="#">Panel Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="contenido-principal">
        <aside>
            <h2>Categorías</h2>
            <ul id="lista-categorias"></ul>
        </aside>

        <main>
            <form id="form-busqueda">
                <input type="text" id="input-busqueda" placeholder="Buscar productos...">
                <button type="submit">Buscar</button>
            </form>
            <h2>Productos Destacados</h2>
            <section id="seccion-productos"></section>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 FoodStore. Todos los derechos reservados.</p>
        <p>Contacto: <a href="mailto:foodstore@gmail.com">foodstore@gmail.com</a></p>
        <p>Callao 670, Buenos Aires, Argentina</p>
    </footer>

    <script type="module" src="./home.ts"></script>
</body>
</html>
