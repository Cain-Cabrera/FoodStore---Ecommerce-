<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - FoodStore</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --rojo: #C0392B;
            --amarillo: #F1C40F;
            --fondo: #FAFAFA;
            --texto: #1A1A1A;
            --blanco: #FFFFFF;
            --borde: #E0E0E0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header { background-color: var(--rojo); }

        .header-contenido {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--amarillo);
        }

        nav ul { list-style: none; display: flex; gap: 24px; }

        nav ul li a {
            color: var(--blanco);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav ul li a:hover { color: var(--amarillo); }

        /* MAIN */
        .main-carrito {
            max-width: 1000px;
            margin: 32px auto;
            padding: 0 24px;
            flex: 1;
            width: 100%;
        }

        .main-carrito > h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            border-left: 4px solid var(--amarillo);
            padding-left: 10px;
        }

        .carrito-vacio {
            text-align: center;
            padding: 60px 24px;
            color: #666;
        }

        .carrito-vacio h2 { border: none; padding: 0; margin-bottom: 16px; }

        .carrito-vacio a { color: var(--rojo); text-decoration: none; font-weight: 600; }

        .tabla-carrito {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--blanco);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--borde);
            margin-bottom: 24px;
        }

        .tabla-carrito th {
            background-color: var(--rojo);
            color: var(--blanco);
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
        }

        .tabla-carrito td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--borde);
            vertical-align: middle;
        }

        .tabla-carrito tbody tr:last-child td { border-bottom: none; }
        .tabla-carrito tbody tr:hover { background-color: #f5f5f5; }

        .nombre-producto { font-weight: 600; color: var(--texto); }

        .subtotal { font-weight: 600; color: var(--rojo); }

        /* CONTROLES DE CANTIDAD */
        .ctrl-cantidad {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-cantidad span {
            min-width: 24px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
        }

        .btn-cantidad {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--rojo);
            background-color: var(--blanco);
            color: var(--rojo);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            line-height: 1;
            transition: background-color 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cantidad:hover {
            background-color: var(--rojo);
            color: var(--blanco);
        }

        .btn-borrar {
            background-color: var(--rojo);
            color: var(--blanco);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .btn-borrar:hover { background-color: #a93226; }

        .carrito-resumen {
            background-color: var(--blanco);
            border: 1px solid var(--borde);
            border-radius: 8px;
            padding: 20px;
            max-width: 400px;
            margin-left: auto;
        }

        .fila-resumen {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--borde);
            font-size: 14px;
        }

        .fila-resumen:last-of-type {
            border-bottom: none;
            font-weight: 700;
            font-size: 16px;
            color: var(--rojo);
            padding-top: 12px;
        }

        .btn-finalizar {
            width: 100%;
            padding: 12px;
            background-color: var(--amarillo);
            color: var(--texto);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            font-family: inherit;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn-finalizar:hover { background-color: #d4ac0d; }

        .btn-volver {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--rojo);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-volver:hover { text-decoration: underline; }

        /* FOOTER */
        footer {
            background-color: var(--rojo);
            color: var(--blanco);
            text-align: center;
            padding: 20px 24px;
            font-size: 13px;
            line-height: 2;
            margin-top: auto;
        }

        footer a { color: var(--amarillo); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <div class="header-contenido">
            <h1 class="logo">FoodStore</h1>
            <nav>
                <ul>
                    <li><a href="../home/home.html">Inicio</a></li>
                    <li><a href="#">Mis Pedidos</a></li>
                    <li><a href="./cart.html">Carrito</a></li>
                    <li><a href="#">Panel Admin</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="main-carrito">
        <a href="../home/home.html" class="btn-volver">← Volver al inicio</a>
        <h2>Tu Carrito de Compras</h2>
        <div id="contenido-carrito"></div>
    </div>

    <footer>
        <p>&copy; 2026 FoodStore. Todos los derechos reservados.</p>
        <p>Contacto: <a href="mailto:foodstore@gmail.com">foodstore@gmail.com</a></p>
        <p>Callao 670, Buenos Aires, Argentina</p>
    </footer>

    <script type="module" src="./cart.ts"></script>
</body>
</html>
